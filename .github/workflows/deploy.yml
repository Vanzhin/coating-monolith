name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vanzhin/coating-monolith

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [ php-fpm, php-cli, supervisor ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_XDEBUG=${{ vars.INSTALL_XDEBUG || 'false' }}
            APP_SECRET=${{ secrets.APP_SECRET }}
            APP_NAME=${{ vars.APP_NAME }}
            DEFAULT_FROM_ADDR=${{ vars.DEFAULT_FROM_ADDR }}
            DEFAULT_FROM_NAME=${{ vars.DEFAULT_FROM_NAME }}
            MAILER_DSN=${{ vars.MAILER_DSN }}
            JWT_SECRET_KEY=${{ vars.JWT_SECRET_KEY }}
            JWT_PUBLIC_KEY=${{ vars.JWT_PUBLIC_KEY }}
            JWT_PASSPHRASE=${{ secrets.JWT_PASSPHRASE }}
            LOG_TELEGRAM_BOT_KEY=${{ secrets.LOG_TELEGRAM_BOT_KEY }}
            LOG_TELEGRAM_CHANNEL=${{ vars.LOG_TELEGRAM_CHANNEL }}
            DB_HOST=${{ vars.DB_HOST }}
            DB_PORT=${{ vars.DB_PORT }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_USER=${{ vars.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ vars.REDIS_HOST }}

  seamless-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/sites/1helper

            # Синхронизируем рабочее дерево сервера с тегом (даёт актуальные
            # docker-compose.prod.yml, infra/Caddyfile, package.json/lockfile, app-код).
            # Гитайгноренные пути (.env*, app/config/jwt/*.pem, vendor/, node_modules/,
            # public/build/, app/var/) reset не трогает.
            git fetch --all --tags --prune
            git reset --hard ${{ github.ref_name }}
            git clean -fd -e .env -e app/.env -e app/config/jwt -e app/var -e app/vendor -e app/node_modules -e app/public/build

            echo "=== Deploying tag ${{ github.ref_name }} (HEAD $(git rev-parse --short HEAD)) ==="

            # Два .env: root для docker-compose interpolation, app/.env для Symfony runtime.
            # <<'EOF' (quoted heredoc) — bash на сервере НЕ раскрывает $X,
            # поэтому Symfony-Dotenv-формулы (MAILER_DSN, DATABASE_URL, DEFAULT_FROM_NAME)
            # уходят в файл буквально, а резолвятся уже Symfony при старте.
            # GHA ${{ vars.* }} / ${{ secrets.* }} раскрываются ДО отправки скрипта.

            # 1) Root .env — только то, что нужно docker-compose.prod.yml для ${X} подстановок.
            cat > .env << 'EOF'
            DOMAIN=${{ vars.DOMAIN }}
            REGISTRY=ghcr.io
            IMAGE_NAME=vanzhin/coating-monolith
            TAG=${{ github.ref_name }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_USER=${{ vars.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_EXTERNAL_PORT=${{ vars.DB_EXTERNAL_PORT }}
            EOF

            # 2) app/.env — то, что Symfony читает при старте (внутрь контейнера через bind-mount ./app:/app).
            cat > app/.env << 'EOF'
            # Framework
            APP_ENV=prod
            APP_SECRET=${{ secrets.APP_SECRET }}
            APP_NAME=${{ vars.APP_NAME }}

            # Database (Doctrine читает DATABASE_URL; placeholders резолвит Symfony Dotenv)
            DB_USER=${{ vars.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ vars.DB_NAME }}
            DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?serverVersion=17&charset=utf8

            # Redis
            REDIS_HOST=${{ vars.REDIS_HOST }}

            # Messenger (использует Doctrine-транспорт; auto_setup=0 — миграции уже прогнаны)
            MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0

            # JWT
            JWT_SECRET_KEY=${{ vars.JWT_SECRET_KEY }}
            JWT_PUBLIC_KEY=${{ vars.JWT_PUBLIC_KEY }}
            JWT_PASSPHRASE=${{ secrets.JWT_PASSPHRASE }}

            # Mailer
            SMTP_HOST=${{ vars.SMTP_HOST }}
            SMTP_USERNAME=${{ vars.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_PORT=${{ vars.SMTP_PORT }}
            SMTP_ENCRYPTION=${{ vars.SMTP_ENCRYPTION }}
            DEFAULT_FROM_ADDR=${{ vars.DEFAULT_FROM_ADDR }}
            DEFAULT_FROM_NAME="${{ vars.DEFAULT_FROM_NAME }}"
            INFO_ADMIN_EMAIL=${{ vars.INFO_ADMIN_EMAIL }}
            MAILER_DSN=smtp://${SMTP_USERNAME}:${SMTP_PASSWORD}@${SMTP_HOST}:${SMTP_PORT}

            # Telegram logging
            LOG_TELEGRAM_BOT_KEY=${{ secrets.LOG_TELEGRAM_BOT_KEY }}
            LOG_TELEGRAM_CHANNEL=${{ vars.LOG_TELEGRAM_CHANNEL }}

            # Telegram notification bot (используется ChannelNotifierService для отправки кодов)
            TELEGRAM_NOTIFICATION_BOT_TOKEN=${{ secrets.TELEGRAM_NOTIFICATION_BOT_TOKEN }}
            TELEGRAM_NOTIFICATION_BOT_USERNAME=${{ vars.TELEGRAM_NOTIFICATION_BOT_USERNAME }}
            TELEGRAM_NOTIFICATION_BOT_WEBHOOK=${{ vars.TELEGRAM_NOTIFICATION_BOT_WEBHOOK }}
            TELEGRAM_NOTIFICATION_BOT_SECRET=${{ secrets.TELEGRAM_NOTIFICATION_BOT_SECRET }}
            EOF

            # Webpack assets — собираем в одноразовом node:22-alpine контейнере.
            # Снимает зависимость от host'овой версии Node (Tagify 4.37+ требует
            # Node ≥22) и делает сборку воспроизводимой через pinned image.
            #
            # В yarn.lock одна git-зависимость (@symfony/stimulus-bridge) с URL
            # 'git+ssh://git@github.com/...'. У деплой-юзера нет SSH-доступа к
            # github.com, поэтому ставим `git` через apk и через `git config
            # insteadOf` переписываем ssh-URL'ы на https-эквиваленты — так же,
            # как это делал host'овый global git config до этого изменения.
            #
            # Контейнер бежит root'ом (apk требует root) → в конце chown'им
            # node_modules + public/build на деплой-юзера, иначе следующий
            # деплой не сможет их перезаписать.
            docker run --rm \
              -e HOME=/tmp \
              -v "$(pwd)/app:/app" \
              -w /app \
              node:22-alpine \
              sh -c "
                set -e
                apk add --no-cache git
                git config --global --add url.'https://github.com/'.insteadOf 'ssh://git@github.com/'
                git config --global --add url.'https://github.com/'.insteadOf 'git@github.com:'
                yarn install --frozen-lockfile
                yarn build
                chown -R $(id -u):$(id -g) node_modules public/build
              "

            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Тянем новые образы ПОКА старые контейнеры обслуживают трафик,
            # затем up -d пересоздаёт только сервисы с изменённым image-хэшем.
            # manager_php-cli (one-shot init) сам делает composer install +
            # migrate + wipe cache + warmup + chown, и manager_php-fpm/
            # manager_supervisor стартуют ТОЛЬКО после его успешного
            # завершения (см. depends_on: condition: service_completed_successfully
            # в docker-compose.prod.yml). Никаких отдельных `run --rm ... cache`
            # команд в pipeline — они дублировали работу и race'ились с
            # запуском php-fpm.
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Deployment completed successfully!"
            
            # ОЧИСТКА СТАРЫХ ОБРАЗОВ
            echo "=== Cleaning up old images ==="

            # Удаляем все vanzhin образы кроме текущего тега
            CURRENT_TAG="${{ github.ref_name }}"
            echo "Keeping images with tag: $CURRENT_TAG and latest"

            docker images --filter "reference=ghcr.io/vanzhin/coating-monolith*" --format "{{.ID}} {{.Repository}} {{.Tag}}" | \
            while read id repo tag; do
              if [[ "$tag" != "$CURRENT_TAG" ]] && [[ "$tag" != "latest" ]]; then
                echo "Removing old image: $repo:$tag"
                docker rmi $id 2>/dev/null || echo "Could not remove $id"
              else
                echo "Keeping: $repo:$tag"
              fi
            done

            echo "Cleanup completed!"
            docker images | grep vanzhin