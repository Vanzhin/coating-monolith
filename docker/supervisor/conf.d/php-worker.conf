[program:php-worker]
# NB: cache:warmup здесь дублирует init-контейнер (manager_php-cli), но оставлен
# как страховка при рестарте только supervisor-контейнера без пересоздания
# init'a. user=www-data — критично: если запускать как root, создаются
# root-owned файлы в /app/var/cache/prod, после чего php-fpm (www-data)
# получает permission-denied на runtime-запись (monolog dedup и т.п.).
command=php bin/console cache:warmup --env=prod
directory=/app
autostart=true
autorestart=false
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/php-worker.log
