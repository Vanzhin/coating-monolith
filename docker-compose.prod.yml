services:
  manager_php-fpm:
    hostname: ${DOMAIN}
    image: ${REGISTRY}/${IMAGE_NAME}-php-fpm:${TAG:-latest}
    volumes:
      - ./app:/app:rw
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
      # manager_php-cli — one-shot init: composer install + migrations +
      # cache:warmup + chown var/cache. php-fpm стартует ТОЛЬКО когда
      # init'ит завершился 0-кодом, иначе поднялся бы на stale DI-cache
      # (bind-mount ./app:/app подменяет запечённый в образ var/cache
      # хостовой директорией предыдущего релиза).
      manager_php-cli:
        condition: service_completed_successfully
    working_dir: /app

  manager_supervisor:
    hostname: ${DOMAIN}
    working_dir: /app
    image: ${REGISTRY}/${IMAGE_NAME}-supervisor:${TAG:-latest}
    restart: always
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
      manager_php-cli:
        condition: service_completed_successfully
    command: bash -c "/usr/bin/supervisord -n -c /etc/supervisor/supervisord.conf"
    volumes:
      - ./app:/app:rw
      - ./docker/supervisor/conf.d:/etc/supervisor/conf.d
      - ./docker/supervisor/log:/var/log/supervisor

  # Init-контейнер (one-shot): единственное место, где что-то ПИШЕТ в /app как root.
  # После него php-fpm/supervisor стартуют как www-data и никогда не касаются
  # cache/log как root — это исключает permission-denied в runtime'e.
  #
  # Шаги: composer → полный wipe var/cache/prod (rm -rf на директорию — включает
  # dot-files) → migrations → JWT-keypair (перенесено из entrypoint php-fpm, где
  # выполнялось как root и портило права после init-chown'а) → cache:warmup →
  # выставление прав с setgid-битом на директориях, чтобы новые файлы,
  # создаваемые www-data в runtime, наследовали группу www-data.
  #
  # set -e гарантирует остановку всей цепочки при первой ошибке — depends_on
  # `service_completed_successfully` не пустит php-fpm/supervisor до успешного 0.
  manager_php-cli:
    hostname: ${DOMAIN}
    working_dir: /app
    image: ${REGISTRY}/${IMAGE_NAME}-php-cli:${TAG:-latest}
    command:
      - bash
      - -c
      - |
        set -e
        composer install --no-dev --no-interaction --no-scripts
        rm -rf var/cache/prod
        mkdir -p var/cache/prod var/log
        php bin/console --no-interaction doctrine:migrations:migrate
        php bin/console --no-interaction lexik:jwt:generate-keypair --skip-if-exists
        php bin/console cache:warmup --env=prod --no-debug
        chown -R www-data:www-data var/cache var/log config/jwt
        # setgid на директориях — новые файлы наследуют группу www-data;
        # 2775 = rwxrwsr-x (owner+group=rw, world=r).
        find var/cache var/log -type d -exec chmod 2775 {} +
        find var/cache var/log -type f -exec chmod 664 {} +
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
    volumes:
      - ./app:/app:rw

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app/public:/app/public:ro
      - caddy_data:/data
    depends_on:
      manager_php-fpm:
        condition: service_started

  manager_redis:
    hostname: ${DOMAIN}
    working_dir: /app
    image: redis:7.2.1
    restart: always
    volumes:
      - ./docker/redis/data/:/data:rw

  manager_db:
    image: postgres:17-alpine
    shm_size: 128mb
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}" ]
      timeout: 45s
      interval: 10s
      retries: 10
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${DB_EXTERNAL_PORT}:5432
    command: [ "postgres", "-c", "logging_collector=on", "-c", "log_directory=/var/lib/postgresql/data/pg_log", "-c", "log_filename=postgresql.log", "-c", "log_statement=all" ]

volumes:
  caddy_data:
