services:
  manager_php-fpm:
    hostname: ${DOMAIN}
    image: ${REGISTRY}/${IMAGE_NAME}-php-fpm:${TAG:-latest}
    volumes:
      - ./app:/app:rw
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
      # manager_php-cli — one-shot init: composer install + migrations +
      # cache:warmup + chown var/cache. php-fpm стартует ТОЛЬКО когда
      # init'ит завершился 0-кодом, иначе поднялся бы на stale DI-cache
      # (bind-mount ./app:/app подменяет запечённый в образ var/cache
      # хостовой директорией предыдущего релиза).
      manager_php-cli:
        condition: service_completed_successfully
    working_dir: /app

  manager_supervisor:
    hostname: ${DOMAIN}
    working_dir: /app
    image: ${REGISTRY}/${IMAGE_NAME}-supervisor:${TAG:-latest}
    restart: always
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
      manager_php-cli:
        condition: service_completed_successfully
    command: bash -c "/usr/bin/supervisord -n -c /etc/supervisor/supervisord.conf"
    volumes:
      - ./app:/app:rw
      - ./docker/supervisor/conf.d:/etc/supervisor/conf.d
      - ./docker/supervisor/log:/var/log/supervisor

  # Init-контейнер: composer install → миграции → wipe stale cache → warmup →
  # chown var/cache и var/log на www-data (php-fpm бежит именно этим юзером).
  # Каждая цепочка через && — любая ошибка обрывает старт всей системы, а не
  # запускает контейнеры молча на broken state. Дублирующиеся ContainerXxx.php
  # от предыдущего релиза очищаются здесь ЖЕ, а не в pipeline деплоя — так race
  # conditions между шагами исключены by design (см. depends_on выше).
  manager_php-cli:
    hostname: ${DOMAIN}
    working_dir: /app
    image: ${REGISTRY}/${IMAGE_NAME}-php-cli:${TAG:-latest}
    command:
      - bash
      - -c
      - |
        set -e
        composer install --no-dev --no-interaction --no-scripts
        rm -rf var/cache/prod/*
        php bin/console --no-interaction doctrine:migrations:migrate
        php bin/console cache:warmup --env=prod --no-debug
        chown -R www-data:www-data var/cache var/log
    depends_on:
      manager_redis:
        condition: service_started
      manager_db:
        condition: service_healthy
    volumes:
      - ./app:/app:rw

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app/public:/app/public:ro
      - caddy_data:/data
    depends_on:
      manager_php-fpm:
        condition: service_started

  manager_redis:
    hostname: ${DOMAIN}
    working_dir: /app
    image: redis:7.2.1
    restart: always
    volumes:
      - ./docker/redis/data/:/data:rw

  manager_db:
    image: postgres:17-alpine
    shm_size: 128mb
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}" ]
      timeout: 45s
      interval: 10s
      retries: 10
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${DB_EXTERNAL_PORT}:5432
    command: [ "postgres", "-c", "logging_collector=on", "-c", "log_directory=/var/lib/postgresql/data/pg_log", "-c", "log_filename=postgresql.log", "-c", "log_statement=all" ]

volumes:
  caddy_data:
