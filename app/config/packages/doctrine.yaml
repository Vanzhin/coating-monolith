doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        types:
            drying_time_series: App\Coatings\Infrastructure\Database\DBAL\DryingTimeSeriesType
            dft_range: App\Coatings\Infrastructure\Database\DBAL\DftRangeType
            recoating_interval_tree: App\Coatings\Infrastructure\Database\DBAL\RecoatingIntervalTreeType
            thermal_exposure_limits: App\Coatings\Infrastructure\Database\DBAL\ThermalExposureLimitsType
        mapping_types:
            jsonb: json
    orm:
#        auto_generate_proxy_classes: true
#        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        default_entity_manager: default
        enable_lazy_ghost_objects: true
        dql:
            string_functions:
                TS_MATCH: App\Coatings\Infrastructure\Database\DQL\TsMatch
                TO_TSQUERY: App\Coatings\Infrastructure\Database\DQL\ToTsquery
                TO_TSVECTOR: App\Coatings\Infrastructure\Database\DQL\ToTsvector
            numeric_functions:
                TS_RANK_CD: App\Coatings\Infrastructure\Database\DQL\TsRankCd
                WORD_SIMILARITY: App\Coatings\Infrastructure\Database\DQL\WordSimilarity
                GREATEST: App\Coatings\Infrastructure\Database\DQL\Greatest
                JSONB_GET_INT: App\Coatings\Infrastructure\Database\DQL\JsonbGetInt
        mappings:
            Users:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Users/Infrastructure/Database/ORM'
                prefix: 'App\Users\Domain\Entity'
                alias: Users
            Coatings:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Coatings/Infrastructure/Database/ORM/Aggregate'
                prefix: 'App\Coatings\Domain\Aggregate'
                alias: Coatings
            Proposals:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Proposals/Infrastructure/Database/ORM/Aggregate'
                prefix: 'App\Proposals\Domain\Aggregate'
                alias: Proposals
            ValueObject:
              is_bundle: false
              type: xml
              dir: '%kernel.project_dir%/src/Users/Infrastructure/Database/ORM/ValueObject'
              prefix: 'App\Users\Domain\Entity\ValueObject'
              alias: ValueObject


#            App:
#                is_bundle: false
#                dir: '%kernel.project_dir%/src/Shared/Domain/Entity'
#                prefix: 'App\Shared\Domain\Entity'
#                alias: App
#        controller_resolver:
#            auto_mapping: true

#when@test:
#    doctrine:
#        dbal:
#            # "TEST_TOKEN" is typically set by ParaTest
#            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
