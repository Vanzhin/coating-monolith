lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600 # in seconds
    user_id_claim: email
    # Lexik читает identity через PropertyAccess по имени поля из user_id_claim
    # (не user_identity_field — этот параметр перебивается user_id_claim'ом).
    # $accessor->getValue($user, 'email') = Email VO → в payload попадает {}.
    # Приведение к строке делает JWTCreatedListener (см. Shared/Application/
    # EventListener/JWTCreatedListener.php) перед подписью токена.
