framework:
    cache:
        # cache.app на Redis — тот же провайдер, что и для сессий (см. services.yaml
        # → app.service_redis_provider). До этого cache.app был на filesystem
        # (var/cache/*/pools/app/), из-за чего:
        #   - счётчики rate limiter'ов (login-link и т.п.) стирались при cache:clear,
        #   - в multi-instance каждый под держал свой счётчик, лимит не работал.
        app: cache.adapter.redis
        default_redis_provider: 'app.service_redis_provider'
